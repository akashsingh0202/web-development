<!DOCTYPE html>
<html>
<head>
<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f4f4f4;
}

h1 {
  text-align: center;
  padding: 20px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(4, 1fr); /* 4 images per row */
  gap: 10px;
  padding: 20px;
}

.gallery img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 8px;
}

</style>
</head>
<body>

<h1>My Photo Gallery</h1>

<div class="gallery">
  <img src="20250510_120145.jpg">
  <img src="20250510_120147.jpg">
  <img src="20250510_120211.jpg">
  <img src="20250510_120430.jpg">
  <img src="20250510_120434(0).jpg">
  <img src="20250510_120434.jpg">
  <img src="1693801425308.jpeg">
  <img src="1693801425401.JPG">
</div>

</body>
</html>
