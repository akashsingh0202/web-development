<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project2</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .A{
            position: relative;
            border: 3px solid black;
            height: 300px;
            width: 400px;
            background-color: aquamarine;
            color: rgb(41, 37, 31);
        }
        #text{
            font-weight: bold;
            position: absolute;
        }
        .B{
            top: 10px;
            left: 10px;
        }
        .C{
            top: 10px;
            right: 10px;
        }
        .D{
            bottom: 10px;
            left: 10px;
        }
        .E{
            bottom: 10px;
            right: 10px;
        }
        .F{
            top: 40%;
            left: 50%;
            transform: translate(-50%,-50%);
        }

    </style>
</head>
<body>
    <div class="A">
        <h1 class="B" id="text">Akash</h1>
        <h1 class="C" id="text">Akash</h1>
        <h1 class="D" id="text">Akash</h1>
        <h1 class="E" id="text">Akash</h1>
        <h1 class="F" id="text">Akash</h1>
    </div>
</body>
</html>
