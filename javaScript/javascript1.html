<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>
<body>
    Enter the value <input type="text" id="a"><br><br>
    <input type="submit" onclick="no()"><br><br>
    <p id ='s'>Shoe result</p>
    <script type="text/javascript">
        function no(){
            let a =Number(document.getElementById('a').value);
            if(a%2==0){
                document.getElementById('s').innerHTML ="the value is even="+a;
            }
            else{
                document.getElementById('s').innerHTML ="the value is odd="+a;
            }
        }
    </script>
</body>
</html>
