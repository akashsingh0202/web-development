///question-10-Write a function that takes an array of objects and returns the object with the highest value for a specified property name.
function getMaxObject(arr, propName) {

  let maxObj = arr[0]; 

  for (let i = 1; i < arr.length; i++) {
    
    if (arr[i][propName] > maxObj[propName]) {
      maxObj = arr[i]; 
    }

  }

  return maxObj;
}



const arr1 = [
  { name: "apple", price: 1 },
  { name: "banana", price: 2 },
  { name: "orange", price: 3 },
];
const maxObj1 = getMaxObject(arr1, "price");
console.log(maxObj1); // { name: 'orange', price: 3 }
