// //Question-8Write a program that takes a number and calculates the sum of all numbers from 1 to that number.
function sumNumbers(numbers) {
    let sum=0;
    for (let i=1;i<=numbers;i++){
        sum=sum+i;
    }
    return sum;
}


console.log(sumNumbers(10)); 
console.log(sumNumbers(1)); 
console.log(sumNumbers(0));
console.log(sumNumbers(-5)); 


// //Question-9 Write a program that takes a string and prints out the number of vowels in the string.
function strVowels(str){
    const vowels=["a","e","i","o","u"];
    let count=0;
    for(let i=0;i<str.length;i++){
        if(vowels.includes(str[i].toLowerCase())){
            count++;
        }
    }
    return count;
}





console.log(strVowels("CodeHelp")); 
console.log(strVowels("hello")); 
console.log(strVowels("world")); 
console.log(strVowels("aeiou")); 
console.log(strVowels("JavaScript")); 
console.log(strVowels("Pranay"));  




// //Question-10Write a function that takes two arrays of integers as arguments and returns an array of the common elements in both arrays, without any duplicates. The returned array should be sorted in ascending order.
function copyArr(arr1,arr2){
    let common=[];
     for(let i=0;i<arr1.length;i++){
        if(arr2.includes(arr1[i])&& !common.includes(arr1[i])){
            common.push(arr1[i]);
        }
     }
     return common.sort((a,b)=>a-b);
}



const arr1 = [1, 2, 3, 4, 5];
const arr2 = [3, 4, 5, 6, 7];
const common = copyArr(arr1, arr2);
console.log(common); // Outputs: [3, 4, 5]
