<!DOCTYPE html>
<html>
<head>
<style>
body{
    height:2000px; /* scroll ke liye */
}
#navbar{
    position:fixed;
    top:0;
    width:100%;
    background:red;
    color:white;
}
</style>
</head>

<body>

<div id="navbar">Navbar</div>

<script>
window.addEventListener("scroll", () => {
    let nav = document.getElementById("navbar");

    if(window.scrollY > 100){
        nav.style.background = "black";
    } else {
        nav.style.background = "red";
    }
});
</script>

</body>
</html>
